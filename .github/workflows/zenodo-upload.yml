name: Zenodo Sandbox Upload

on:
  release:
    types: [published]

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Archive Repository
        run: git archive --format=zip HEAD > source_code.zip

      - name: Upload to Zenodo Sandbox
        uses: megasanjay/zenodo-upload@v2.0.1
        with:
          zenodo_token: ${{ secrets.ZENODO_SANDBOX_TOKEN }}
          zenodo_sandbox: true
          # Note: Zenodo requires a Deposition ID for updates. 
          # For the very first upload, you can leave the ID blank 
          # in some actions or manually create a blank record in Sandbox 
          # and paste its ID here.
          zenodo_deposition_id: '1234567'
          zenodo_publish: false # Keep false while testing!
